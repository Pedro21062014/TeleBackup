name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (ex: v1.3.2)"
        required: true
        default: "v1.6.0"
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/android-sdk
          key: android-sdk-34-${{ runner.os }}

      - name: Install Android SDK cmdline-tools
        run: |
          set -e
          SDK_ROOT="${RUNNER_TEMP}/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          cd /tmp
          curl -fsSL -o cmdtools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q -o cmdtools.zip -d "$SDK_ROOT/cmdline-tools"
          rm -rf "$SDK_ROOT/cmdline-tools/latest"
          mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Accept licenses and install packages
        run: |
          set -e
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses >/tmp/licenses.txt || true
          sdkmanager --sdk_root="$ANDROID_HOME" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"
          ls "$ANDROID_HOME/platforms"
          ls "$ANDROID_HOME/build-tools"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > telebackup.jks
          ls -la telebackup.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: telebackup.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --stacktrace
          ls -lh app/build/outputs/apk/release/

      - name: Verify APK
        run: |
          set -e
          APK=$(ls app/build/outputs/apk/release/*-release.apk | head -1)
          BT="$ANDROID_HOME/build-tools/34.0.0"
          "$BT/aapt" dump badging "$APK" | head -8
          "$BT/apksigner" verify --verbose "$APK"
          cp "$APK" TeleBackup-signed.apk
          cp "$APK" TeleBackup-v1.6.0-signed.apk
          ls -lh TeleBackup-signed.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeleBackup-APK
          path: |
            TeleBackup-signed.apk
            TeleBackup-v1.6.0-signed.apk

      - name: Resolve tag name
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: TeleBackup ${{ steps.meta.outputs.tag }}
          body: |
            ## TeleBackup ${{ steps.meta.outputs.tag }}

            APK assinado pelo Gradle (v1+v2+v3).

            ### Novidades
            - Atualizador automático com barra de progresso no topo
            - Download e instalação do APK pelo app
            - Tema claro: textos legíveis em todos os cards
            - Intro não repete ao girar a tela
            - Nuvem: swipe, zoom e prefetch mais rápido
            - Tema claro com textos legíveis
            - Upload paralelo (mais rápido)
            - Splash/intro com logo
            - Logo do avião redesenhado
            - App mais fluido
            - Vibração ao trocar de aba
            - Tema claro (e escuro)
            - Galeria Nuvem restaura após reinstalar com as mesmas credenciais
            - Data de envio em cada item da nuvem

            ### Instalação
            1. Desinstale a versão antiga se necessário
            2. Instale o APK
            3. Configure token + Group ID — a aba Nuvem sincroniza sozinha
          files: |
            TeleBackup-signed.apk
            TeleBackup-v1.6.0-signed.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
